<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playing a game on Yobble</title>
<link rel="stylesheet" href="/theme.css" rel="stylesheet"><link rel="stylesheet" href="/style.css">
<style>
  html, body {
    height: 100%;
  }
  body {
    margin: 0;
  }
  .play-shell {
    height: 100vh;
    max-width: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
  }
  .play-top {
    display: flex;
    gap: 16px;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  .play-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .play-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
    display: grid;
    overflow: hidden;
  }
  .play-shell.is-collapsed .play-top {
    display: none;
  }
  body.desktop-app .play-top {
    -webkit-app-region: drag;
    padding-right: 12px;
  }
  body.desktop-app .play-top button,
  body.desktop-app .play-top a,
  body.desktop-app .play-top input,
  body.desktop-app .play-top select,
  body.desktop-app .play-top textarea {
    -webkit-app-region: no-drag;
  }
  .collapse-toggle {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .collapse-toggle:hover {
    filter: brightness(1.05);
  }
  .collapse-overlay {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 10;
    display: none;
  }
  .play-shell.is-collapsed .collapse-overlay {
    display: inline-flex;
  }
  .frame-shell,
  .play-frame {
    width: 100%;
    height: 100%;
  }
  .play-frame {
    border: 0;
  }
  .window-controls {
    display: none;
    align-items: stretch;
    gap: 6px;
    margin-left: 12px;
  }
  body.desktop-app .window-controls {
    display: flex;
  }
  .windowControl {
    width: 38px;
    height: 30px;
    padding: 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
  }
  .windowControl:hover {
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 14%, var(--surface));
  }
  .windowControl-close:hover {
    border-color: var(--danger, #ef4444);
    background: color-mix(in srgb, var(--danger, #ef4444) 18%, var(--surface));
  }
</style>
</head>
<body>
<main class="play-shell">
  <div class="play-top">
    <div class="play-info">
      <div class="play-title" id="title">Launching…</div>
      <div class="play-meta" id="info">Starting…</div>
    </div>
    <div class="play-actions">
      <button class="play-btn" id="refreshBtn">Refresh</button>
      <button class="play-btn" id="fullscreenBtn" type="button">Fullscreen</button>
      <button class="collapse-toggle" id="collapseBtn" type="button">Collapse</button>
      <button class="play-btn primary" id="backBtn">Back to game</button>
    </div>
    <div class="window-controls" id="windowControls" hidden aria-label="Window controls">
      <button type="button" class="windowControl" data-window-action="minimize" aria-label="Minimize window">−</button>
      <button type="button" class="windowControl" data-window-action="maximize" aria-label="Maximize window">▢</button>
      <button type="button" class="windowControl windowControl-close" data-window-action="close" aria-label="Close window">×</button>
    </div>
  </div>
  <div class="play-wrap">
    <button class="collapse-toggle collapse-overlay" id="expandBtn" type="button">X</button>
    <div class="frame-shell">
      <iframe id="frame" class="play-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups"></iframe>
    </div>
  </div>
</main>
<script type="module" src="/js/pages/play.js"></script>
</body>
</html>
