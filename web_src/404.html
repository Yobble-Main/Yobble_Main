<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Yobble</title>
<meta name="yobble-page" content="404">
<link rel="stylesheet" href="/theme.css" rel="stylesheet"><link rel="stylesheet" href="/style.css">
</head>
<body>
<main>
  <section class="card">
    <div class="muted">Error 404</div>
    <h1 class="title" id="errTitle">Page not found.</h1>
    <div class="actions" id="errActions">
      <a class="action primary" href="/games">Browse games</a>
      <a class="action" href="/index">Home</a>
    </div>
  </section>
</main>
<script>
  window.__YOBBLE_IS_404_PAGE__ = true;
  const params = new URLSearchParams(location.search);
  const msg = params.get("msg");
  let embedded = false;
  try {
    embedded = window.self !== window.top;
  } catch {
    embedded = true;
  }
  if (msg) {
    document.getElementById("errTitle").textContent = msg;
  }
  if (embedded) {
    const actions = document.getElementById("errActions");
    if (actions) actions.hidden = true;
  }
</script>
</body>
</html>
