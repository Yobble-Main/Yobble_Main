<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Item - Yobble</title>
<link rel="stylesheet" href="/theme.css" rel="stylesheet"><link rel="stylesheet" href="/style.css">
</head>
<body>
<main class="card" style="max-width:500px">
<h1>Upload Item</h1>
<label>Item Code</label><input id="code">
<label>Name</label><input id="name">
<label>Description</label><textarea id="desc"></textarea>
<label>Price</label><input id="price" type="number" min="0" step="1" placeholder="0">
<label>Icon</label><input type="file" id="icon">
<button id="upload" class="primary">Submit for review</button>
<div id="status" class="muted"></div>
<div class="progress" id="uploadProgressWrap" aria-hidden="true" style="display:none;height:10px;margin-top:12px;border-radius:999px;overflow:hidden;background:rgba(148,163,184,.22)">
  <div id="uploadProgress" style="width:0%;height:100%;border-radius:999px;background:linear-gradient(90deg,#1d4ed8,#38bdf8);transition:width .15s ease"></div>
</div>
</main>
<script type="module" src="/js/pages/item-upload.js"></script>
</body></html>
