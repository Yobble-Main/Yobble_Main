name: Android Build

on:
  push:
    paths:
      - ".github/workflows/android-build.yml"
      - "Android src/Yobble/**"
  pull_request:
    paths:
      - ".github/workflows/android-build.yml"
      - "Android src/Yobble/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_TYPE: ${{ secrets.ANDROID_KEYSTORE_TYPE }}
    defaults:
      run:
        shell: bash
        working-directory: "./Android src/Yobble"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew --no-daemon clean assembleDebug

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/yobble-release.keystore"

      - name: Resolve release key alias
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' }}
        run: |
          STORE_TYPE="${ANDROID_KEYSTORE_TYPE:-PKCS12}"
          DETECTED_ALIAS="$(keytool -list -v \
            -storetype "$STORE_TYPE" \
            -keystore "$RUNNER_TEMP/yobble-release.keystore" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" | awk -F': ' '/Alias name:/{print $2; exit}')"

          if [ -z "$DETECTED_ALIAS" ]; then
            echo "Unable to detect a signing alias from the release keystore." >&2
            exit 1
          fi

          echo "Resolved Android signing alias from keystore metadata."
          echo "RESOLVED_ANDROID_KEY_ALIAS=$DETECTED_ALIAS" >> "$GITHUB_ENV"

      - name: Build signed release APK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_PASSWORD != '' }}
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/yobble-release.keystore
          ANDROID_KEY_ALIAS: ${{ env.RESOLVED_ANDROID_KEY_ALIAS }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: yobble-debug-apk
          path: Android src/Yobble/app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: yobble-release-apk
          path: Android src/Yobble/app/build/outputs/apk/release/*.apk
